<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Unshaken | Official</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0d0d0d, #1a1a1a);
      color: white;
      text-align: center;
    }

    .container {
      padding: 60px 20px;
      max-width: 800px;
      margin: auto;
    }

    h1 {
      font-size: 3em;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    p {
      color: #cccccc;
      margin-bottom: 40px;
    }

    .button {
      display: block;
      width: 220px;
      margin: 12px auto;
      padding: 14px;
      border: 1px solid #444;
      border-radius: 8px;
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }

    .button:hover {
      background: #222;
      transform: scale(1.05);
    }

    .footer {
      margin-top: 60px;
      font-size: 0.8em;
      color: #666;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>The Unshaken</h1>
    <p>Music. Stories. The journey from the valley to glory.</p>

    <a class="button" href="https://youtube.com">🎬 Watch on YouTube</a>
    <a class="button" href="https://spotify.com">🎧 Listen on Spotify</a>
    <a class="button" href="https://beacons.ai/theunshaken">🔗 All Links</a>

    <div class="footer">
      © 2026 The Unshaken
    </div>
  </div>
</body>
</html>
