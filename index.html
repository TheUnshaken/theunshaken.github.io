<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Unshaken | Official</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      color: #f5f1e6;
      text-align: center;
      background:
        linear-gradient(rgba(20,15,10,0.72), rgba(20,15,10,0.86)),
        url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1600&q=80');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .container {
      padding: 70px 20px 60px;
      max-width: 800px;
      margin: auto;
    }

    h1 {
      font-size: 3.2em;
      margin-bottom: 14px;
      letter-spacing: 1px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.45);
    }

    p {
      color: #e7dcc8;
      margin-bottom: 40px;
      font-size: 1.2em;
      line-height: 1.5;
      text-shadow: 0 1px 6px rgba(0,0,0,0.4);
    }

    .button {
      display: block;
      width: 240px;
      margin: 14px auto;
      padding: 15px 18px;
      border: 1px solid rgba(245, 241, 230, 0.28);
      border-radius: 10px;
      text-decoration: none;
      color: #f5f1e6;
      background: rgba(35, 25, 18, 0.45);
      backdrop-filter: blur(2px);
      transition: 0.3s;
      font-size: 1.1em;
      box-shadow: 0 4px 18px rgba(0,0,0,0.18);
    }

    .button:hover {
      background: rgba(60, 42, 28, 0.7);
      transform: scale(1.03);
    }

    .section {
      margin-top: 70px;
    }

    .album-img {
      width: 260px;
      border-radius: 10px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      margin-bottom: 20px;
    }

    .footer {
      margin-top: 65px;
      font-size: 0.9em;
      color: #cbbda5;
      text-shadow: 0 1px 4px rgba(0,0,0,0.35);
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>The Unshaken</h1>
    <p>Stories carved in sound. Songs that stay with you.</p>

    <a class="button" href="https://youtube.com">🎬 Watch on YouTube</a>
    <a class="button" href="https://spotify.com">🎧 Listen on Spotify</a>
    <a class="button" href="https://beacons.ai/theunshaken">🔗 All Links</a>

    <!-- 🎸 START HERE SECTION -->
    <div class="section">
      <h2 style="font-weight: normal;">Start Here</h2>

      <img class="album-img"
        src="https://via.placeholder.com/300x300"
        alt="The Old River Sessions">

      <p style="max-width:500px; margin:0 auto 20px;">
        The Old River Sessions — a quiet front porch, a worn guitar, and stories carried on the current.
      </p>

      <a class="button" href="https://youtube.com">
        ▶ Start Listening
      </a>
    </div>

    <div class="footer">
      © 2026 The Unshaken
    </div>

  </div>
</body>
</html>
